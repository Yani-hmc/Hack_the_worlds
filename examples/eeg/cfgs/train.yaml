# EEG SSL pretraining config (two-view VICReg on TUAB_PREPROCESSED).
meta:
  seed: 0
  ckpt_dir: UPDATEME/checkpoints/eeg/dev
data:
  data_root: /lustre/work/pdl17890/udl806719/datasets/Neuro/TUAB-TUEV/TUAB_PREPROCESSED
  split: train
  n_channels: 19
  sfreq: 200
  window_sec: 10.0
  epoch_size: 20000        # random windows per epoch
  batch_size: 128
  num_workers: 8
  aug_noise_std: 0.1
  aug_scale_jitter: 0.2
  aug_chan_drop_p: 0.2
  aug_time_mask_frac: 0.2
  # --- Phase 2: exact EB time-series corruption (~40% per view) ---
  # aug_exact_corruption: false keeps the legacy contiguous time-mask (base run).
  # Flip to true for ~20% time-masking + ~20% outlier injection per view.
  aug_exact_corruption: false
  aug_mask_frac: 0.2          # fraction of timepoints zero-masked (per channel)
  aug_outlier_frac: 0.2       # fraction of timepoints replaced by outliers
  aug_outlier_scale: 6.0      # outlier magnitude in z-scored sigmas (±k)
model:
  in_channels: 19
  out_dim: 256          # latent dim D (encoder output)
  # --- 1D conv encoder ---
  hidden: 64            # base width (doubles each block until out_dim)
  depth: 4              # strided conv blocks (time downsampled by 2^depth)
  kernel: 7             # conv kernel size
  # --- two-view VICReg objective ---
  projector_spec: "256-1024-1024-1024"  # MUST start with out_dim
  std_coeff: 25.0       # variance (anti-collapse) weight
  cov_coeff: 1.0        # covariance (decorrelation) weight
  # --- Phase 5: optional auxiliary spectral losses (default 0 = base run) ---
  spectral_coeff: 0.0          # DDSP multi-scale spectral loss weight
  fft_consistency_coeff: 0.0   # whole-window FFT magnitude consistency weight
  spectral_fft_sizes: [256, 128, 64, 32]
  spectral_log_alpha: 1.0      # weight on the log-magnitude term (DDSP alpha)
  fft_consistency_log: true    # take log of FFT magnitudes in the consistency term
optim:
  epochs: 20
  lr: 0.001
  weight_decay: 1.0e-6
