# EEG SSL pretraining config (two-view VICReg on TUAB_PREPROCESSED).
meta:
  seed: 0
  ckpt_dir: UPDATEME/checkpoints/eeg/dev
data:
  data_root: /lustre/work/pdl17890/udl806719/datasets/Neuro/TUAB-TUEV/TUAB_PREPROCESSED
  split: train
  n_channels: 19
  sfreq: 200
  window_sec: 10.0
  epoch_size: 20000        # random windows per epoch
  batch_size: 128
  num_workers: 8
  aug_noise_std: 0.1
  aug_scale_jitter: 0.2
  aug_chan_drop_p: 0.2
  aug_time_mask_frac: 0.2
  subset_frac: null        # e.g. 0.05 for a fast, class-balanced 5% smoke-test run
  subset_seed: 0
model:
  in_channels: 19
  out_dim: 256          # latent dim D (encoder output)
  encoder_type: conv     # conv | labram | eegpt | biot
  window_len: 2000       # samples per window (sfreq * window_sec, must match data:)
  # encoder: conv (EEG1DEncoder)
  hidden: 64            # base conv width, doubles each of `depth` blocks
  depth: 4              # number of strided conv blocks (T=2000 -> T'=125)
  kernel_size: 7
  # encoder: labram | eegpt | biot (patch transformers, examples/eeg/encoders.py)
  patch_len: 200         # samples per time-patch (1s @ 200Hz) -> 10 patches/channel
  embed_dim: 128
  tr_depth: 4            # transformer layers (distinct from conv's `depth`)
  n_heads: 4
  mlp_ratio: 4.0
  dropout: 0.1
  # SSL objective
  objective: twoview     # twoview (EEGSSL) | predictive (EEGPredictiveJEPA)
  ssl_loss: vicreg       # vicreg (default) | sigreg (LeJEPA/BCS anti-collapse) -- twoview only
  projector_spec: 256-1024-1024   # twoview only
  std_coeff: 1.0         # anti-collapse std term -- vicreg (twoview) and predictive
  cov_coeff: 1.0         # anti-collapse cov term -- vicreg (twoview) and predictive
  num_slices: 256        # sigreg only
  lmbd: 10.0             # sigreg only
  ema: 0.996             # predictive only -- target-encoder momentum
optim:
  epochs: 20
  lr: 0.001
  weight_decay: 1.0e-6
